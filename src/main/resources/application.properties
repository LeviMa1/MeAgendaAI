spring.application.name=agenda

# ============================================================
# BANCO DE DADOS
# Localmente usa H2 (arquivo). Em produńŃo (MySQL), defina as
# varißveis de ambiente DATABASE_URL, DATABASE_USERNAME e
# DATABASE_PASSWORD (ex.: jdbc:mysql://host:3306/agenda).
# ============================================================
spring.datasource.url=${DATABASE_URL:jdbc:h2:file:./agenda-db;AUTO_SERVER=TRUE}
spring.datasource.username=${DATABASE_USERNAME:sa}
spring.datasource.password=${DATABASE_PASSWORD:}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=${JPA_DIALECT:org.hibernate.dialect.H2Dialect}

# Desabilita H2 console quando usar MySQL
spring.h2.console.enabled=${H2_CONSOLE:true}
spring.h2.console.path=/h2-console

# ============================================================
# VONAGE SMS (opcional - se nŃo configurado, imprime no console)
# Defina VONAGE_API_KEY e VONAGE_API_SECRET como varißveis de
# ambiente e reinicie a aplicańŃo.
# ============================================================
vonage.api-key=${VONAGE_API_KEY:}
vonage.api-secret=${VONAGE_API_SECRET:}
vonage.from-number=${VONAGE_FROM_NUMBER:MeAgenda}

# ============================================================
# CALLMEBOT WHATSAPP (opcional e gratuito)
# Para ativar: o usußrio precisa enviar "I allow callmebot to
# send me messages" para +34 644 60 81 82 no WhatsApp.
# Depois configura: CALLMEBOT_ENABLED=true e CALLMEBOT_APIKEY=<key>
# ============================================================
callmebot.enabled=${CALLMEBOT_ENABLED:false}
callmebot.apikey=${CALLMEBOT_APIKEY:}
