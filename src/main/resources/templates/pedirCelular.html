<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Informar Celular - Agenda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 450px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
            text-align: center;
            font-size: 28px;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .user-info {
            background-color: #e7f3ff;
            border: 1px solid #b3d9ff;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 25px;
            text-align: center;
            color: #0066cc;
            font-size: 14px;
        }

        .user-info strong {
            display: block;
            font-size: 16px;
            margin-top: 5px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        .btn-submit {
            background-color: #667eea;
            color: white;
        }

        .btn-submit:hover {
            background-color: #5568d3;
        }

        .btn-cancel {
            background-color: #e0e0e0;
            color: #333;
        }

        .btn-cancel:hover {
            background-color: #d0d0d0;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .info-message {
            background-color: #d4edda;
            color: #155724;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            font-size: 14px;
        }
    </style>
    <script>
        function mascaraCelular(input) {
            let valor = input.value.replace(/\D/g, '');

            if (valor.length > 11) {
                valor = valor.slice(0, 11);
            }

            if (valor.length >= 0) {
                valor = valor.replace(/^(\d{0,2})(\d{0,5})(\d{0,4})$/, function(_, g1, g2, g3) {
                    if (g3) {
                        return '(' + g1 + ') ' + g2 + '-' + g3;
                    } else if (g2) {
                        return '(' + g1 + ') ' + g2;
                    } else if (g1) {
                        return '(' + g1;
                    }
                    return '';
                });
            }

            input.value = valor;
        }

        function validarCelular() {
            const celularInput = document.getElementById('celular');
            const celular = celularInput.value.replace(/\D/g, '');

            if (celular === '' || celular.length === 0) {
                alert('Por favor, digite seu celular!');
                return false;
            }

            if (celular.length !== 11) {
                alert('O celular deve ter 11 dígitos (DDD + número)!');
                return false;
            }

            return true;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const celularInput = document.getElementById('celular');
            if (celularInput) {
                celularInput.addEventListener('input', function() {
                    mascaraCelular(this);
                });
                celularInput.focus();
            }
        });
    </script>
</head>
<body>
    <div class="container">
        <h1>Confirmar Celular</h1>
        <p class="subtitle">Última etapa para ativar sua conta</p>

        <div class="user-info">
            <div>Bem-vindo(a)!</div>
            <strong th:text="${nome}"></strong>
        </div>

        <div th:if="${erro}" class="error-message" th:text="${erro}"></div>

        <div class="info-message">
            📱 Informe seu celular - você receberá um código por SMS
        </div>

        <form method="POST" action="/pedir-celular" onsubmit="return validarCelular()">
            <input type="hidden" name="email" th:value="${email}">

            <div class="form-group">
                <label for="celular">Celular *</label>
                <input type="text" id="celular" name="celular" placeholder="(XX) XXXXX-XXXX" required>
            </div>

            <div class="button-group">
                <button type="submit" class="btn-submit">Continuar</button>
                <button type="button" class="btn-cancel" onclick="window.location.href='/login'">Cancelar</button>
            </div>
        </form>
    </div>
</body>
</html>
