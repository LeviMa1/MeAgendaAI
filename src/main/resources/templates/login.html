<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Agenda</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 40px;
            border-radius: 10px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px;
        }

        .logo-icon img {
            width: 250px;
            height: auto;
            object-fit: contain;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.5px;
        }

        .logo-subtitle {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
            letter-spacing: 1px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 5px rgba(102, 126, 234, 0.1);
        }

        input::placeholder {
            color: #999;
        }

        button {
            width: 100%;
            padding: 12px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 20px;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #5568d3;
        }

        .error-message {
            background-color: #f8d7da;
            color: #721c24;
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #f5c6cb;
        }

        .success-message {
            background-color: #d4edda;
            color: #155724;
            padding: 20px;
            border-radius: 5px;
            margin-bottom: 20px;
            border: 1px solid #c3e6cb;
            text-align: center;
            font-size: 18px;
            font-weight: 600;
        }

        .footer-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #eee;
        }

        .footer-link a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
        }

        .footer-link a:hover {
            text-decoration: underline;
        }

        .success-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn-secundario {
            flex: 1;
            padding: 10px;
            background-color: #e0e0e0;
            color: #333;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }

        .btn-secundario:hover {
            background-color: #d0d0d0;
        }

        .btn-primario {
            flex: 1;
            padding: 10px;
            background-color: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background-color 0.3s;
        }

        .btn-primario:hover {
            background-color: #5568d3;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- Mensagem de Sucesso -->
        <div th:if="${sucesso}" class="success-message">
            ✓ Login realizado com sucesso! Bem vindo, <span th:text="${primeiroNome}"></span>!
        </div>

        <!-- Mostrar formulário apenas se não houve sucesso -->
         <div th:if="${sucesso == null or sucesso == false}">
             <div class="logo">
                  <div class="logo-icon">
                      <img th:src="@{/MeAgendaAI_without_bg.png}" alt="MeAgendaAI Logo">
                  </div>
             </div>

            <!-- Mensagem de Erro -->
            <div th:if="${erro}" class="error-message">
                <strong>Erro:</strong> <span th:text="${erro}"></span>
            </div>

            <!-- Formulário de Login -->
            <form method="POST" action="/login">
                <div class="form-group">
                    <label for="email">Email / Usuário *</label>
                    <input type="text" id="email" name="email" placeholder="seu.email@exemplo.com" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha *</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>
                </div>

                <button type="submit">Entrar</button>

                <div class="footer-link">
                    <p>Ainda não tem cadastro? <a href="/cadastro">Cadastre-se aqui</a></p>
                </div>
            </form>
        </div>

        <!-- Botões após sucesso -->
         <div th:if="${sucesso}" class="success-actions">
             <a href="/agenda" class="btn-primario">Minha Agenda</a>
         </div>
         <div th:if="${sucesso}" style="text-align: center; margin-top: 15px;">
             <a href="/login" style="color: #667eea; text-decoration: none; font-size: 14px;">Sair</a>
         </div>
    </div>
</body>
</html>
