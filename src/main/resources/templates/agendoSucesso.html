<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento Realizado - MeAgendaAI</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            max-width: 600px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            text-align: center;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .success-icon {
            font-size: 80px;
            padding-top: 40px;
            animation: bounce 1s ease-in-out;
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-20px);
            }
        }

        .content {
            padding: 40px;
        }

        .content h1 {
            color: #28a745;
            font-size: 2em;
            margin: 20px 0;
        }

        .content p {
            color: #666;
            font-size: 1.1em;
            margin: 15px 0;
            line-height: 1.6;
        }

        .message-box {
            background: #d4edda;
            border: 2px solid #28a745;
            border-radius: 10px;
            padding: 20px;
            margin: 25px 0;
            color: #155724;
        }

        .message-box strong {
            display: block;
            font-size: 1.2em;
            margin-bottom: 10px;
        }

        .button-group {
            display: flex;
            gap: 15px;
            margin: 30px 0 40px 0;
            flex-direction: column;
        }

        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            display: inline-block;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .info-details {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: left;
        }

        .info-details p {
            margin: 10px 0;
            color: #333;
        }

        .info-details strong {
            color: #667eea;
        }

        .loading-bar {
            width: 100%;
            height: 4px;
            background: #e9ecef;
            border-radius: 2px;
            margin: 20px 0;
            overflow: hidden;
        }

        .loading-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            animation: fill 3s ease-out forwards;
        }

        @keyframes fill {
            0% {
                width: 0%;
            }
            100% {
                width: 100%;
            }
        }

        .timer {
            color: #667eea;
            font-weight: bold;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="success-icon">
            ✅
        </div>

        <div class="content">
            <h1>Agendamento Confirmado!</h1>

            <div class="message-box">
                <strong>Parabéns, <span th:text="${nomeUsuario}"></span>!</strong>
                <p>Seu agendamento foi realizado com sucesso.</p>
            </div>

            <p>Você será redirecionado para a lista de seus agendamentos em alguns segundos...</p>

            <div class="loading-bar">
                <div class="loading-bar-fill"></div>
            </div>

            <p>Redirecionando em: <span class="timer" id="timer">3</span>s</p>

            <div class="button-group">
                <a href="/agenda" class="btn btn-primary">Ver Meus Agendamentos</a>
                <a href="/" class="btn btn-secondary">Voltar ao Início</a>
            </div>
        </div>
    </div>

    <script>
        let contador = 3;

        function atualizarContador() {
            const timerElement = document.getElementById('timer');
            timerElement.textContent = contador;

            if (contador === 0) {
                window.location.href = '/agenda';
            } else {
                contador--;
                setTimeout(atualizarContador, 1000);
            }
        }

        // Iniciar contagem regressiva
        atualizarContador();
    </script>
</body>
</html>
